name: Release binaries

on:
  push:
    branches:
      - main
    paths:
      - src/main.rs

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: instadown-linux-x86_64.tar.gz
          - name: macOS Apple Silicon
            os: macos-15
            target: aarch64-apple-darwin
            asset: instadown-macos-aarch64.tar.gz
          - name: macOS Intel
            os: macos-15-intel
            target: x86_64-apple-darwin
            asset: instadown-macos-x86_64.tar.gz
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: instadown-windows-x86_64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          tar -C "target/${{ matrix.target }}/release" -czf "${{ matrix.asset }}" instadown

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "target/${{ matrix.target }}/release/instadown.exe" `
            -DestinationPath "${{ matrix.asset }}"

      - name: Upload binary archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download binary archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Prepare release metadata and installers
        id: release
        shell: bash
        run: |
          version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          tag="v${version}-build.${GITHUB_RUN_NUMBER}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "title=instadown ${tag}" >> "$GITHUB_OUTPUT"

          sed "s|__REPOSITORY__|${GITHUB_REPOSITORY}|g" scripts/install.sh > dist/install.sh
          sed "s|__REPOSITORY__|${GITHUB_REPOSITORY}|g" scripts/install.ps1 > dist/install.ps1
          chmod +x dist/install.sh

          cd dist
          sha256sum instadown-* > SHA256SUMS

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          TITLE: ${{ steps.release.outputs.title }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* \
              --target "$GITHUB_SHA" \
              --title "$TITLE" \
              --generate-notes
          fi

